<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Practical</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div ng-view></div>

    <!-- AngularJS 1.8.2 -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>

    <!-- App Module (load first - defines the module) -->
    <script src="/src/app.js"></script>

    <!-- Controllers (load after app.js) -->
    <script src="/src/controllers/home.controller.js"></script>
    <script src="/src/controllers/practical6.controller.js"></script>
    <script src="/src/controllers/practical7.controller.js"></script>

    <script>
        // Debug: Check if Angular loaded properly
        console.log('Angular loaded:', typeof angular !== 'undefined');
        console.log('App module defined:', angular.module('app'));
    </script>
</body>
</html>
