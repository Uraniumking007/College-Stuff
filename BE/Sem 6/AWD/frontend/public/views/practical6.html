<div class="container" ng-controller="Practical6Controller">
  <h1 class="text-center mb-4">Practical 6: Two-Way Data Binding</h1>

  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Two-Way Data Binding Demo</h5>
        </div>
        <div class="card-body">
          <form ng-submit="submitForm()">
            <div class="mb-3">
              <label for="name" class="form-label">Name:</label>
              <input
                type="text"
                class="form-control"
                id="name"
                ng-model="name"
                placeholder="Enter your name"
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email:</label>
              <input
                type="email"
                class="form-control"
                id="email"
                ng-model="email"
                placeholder="Enter your email"
              />
            </div>

            <div class="mb-3">
              <label for="message" class="form-label">Message:</label>
              <textarea
                class="form-control"
                id="message"
                rows="3"
                ng-model="message"
                placeholder="Enter your message"
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="#/" class="btn btn-secondary">Back to Home</a>
          </form>
        </div>
      </div>

      <!-- Live Preview - Shows two-way binding in action -->
      <div class="card mt-4">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Live Preview (Two-Way Binding)</h5>
        </div>
        <div class="card-body">
          <p><strong>Name:</strong> {{name || '(Not entered)'}}</p>
          <p><strong>Email:</strong> {{email || '(Not entered)'}}</p>
          <p><strong>Message:</strong> {{message || '(Not entered)'}}</p>
        </div>
      </div>
    </div>
  </div>
</div>
