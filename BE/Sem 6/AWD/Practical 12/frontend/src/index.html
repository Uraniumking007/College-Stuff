<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Todo App - Practical 12</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐳 Docker Todo App</h1>
            <p class="subtitle">Practical 12: Frontend + Backend + Database with Docker</p>
        </header>

        <div class="add-todo-section">
            <form id="todoForm" class="todo-form">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="What needs to be done?" 
                    autocomplete="off"
                    required
                >
                <button type="submit" class="btn btn-primary">Add Todo</button>
            </form>
        </div>

        <div class="stats">
            <span id="totalCount">Total: 0</span>
            <span id="completedCount">Completed: 0</span>
            <span id="pendingCount">Pending: 0</span>
        </div>

        <div class="todo-list" id="todoList">
            <!-- Todos will be rendered here -->
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading todos...</p>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <footer>
            <p>Stack: HTML5 + CSS3 + Vanilla JS | Express.js | MongoDB | Docker</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
